<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <meta name="mobile-web-app-capable" content="yes">
  <title>3D Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #viewer {
      width: 100%;
      height: 100%;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* 전체화면 토글 버튼 */
    #fullscreen-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    #fullscreen-btn:active {
      transform: scale(0.9);
      background: rgba(255, 255, 255, 0.3);
    }

    #fullscreen-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.2s ease;
    }

    /* 전체화면 아이콘 (expand) */
    .icon-expand { display: block; }
    .icon-compress { display: none; }

    /* 전체화면 상태일 때 아이콘 전환 */
    body.is-fullscreen .icon-expand { display: none; }
    body.is-fullscreen .icon-compress { display: block; }

    /* 버튼 페이드 - 3초 후 반투명 */
    #fullscreen-btn.faded {
      opacity: 0.3;
    }

    #fullscreen-btn:hover,
    #fullscreen-btn:active {
      opacity: 1 !important;
    }

    /* 토스트 메시지 */
    #toast {
      position: fixed;
      bottom: 90px;
      right: 24px;
      z-index: 9998;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div id="viewer">
    <iframe
      id="stream-frame"
      src="https://streams.vagon.io/streams/4b7becfc-d311-4c2c-9021-8781823aaf73"
      allowfullscreen
      allow="autoplay; fullscreen; microphone; camera"
      scrolling="no">
    </iframe>
  </div>

  <!-- 전체화면 토글 버튼 -->
  <button id="fullscreen-btn" onclick="toggleFullscreen()" title="전체화면">
    <!-- Expand 아이콘 -->
    <svg class="icon-expand" viewBox="0 0 24 24">
      <polyline points="15 3 21 3 21 9"/>
      <polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/>
      <line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
    <!-- Compress 아이콘 -->
    <svg class="icon-compress" viewBox="0 0 24 24">
      <polyline points="4 14 10 14 10 20"/>
      <polyline points="20 10 14 10 14 4"/>
      <line x1="10" y1="14" x2="3" y2="21"/>
      <line x1="21" y1="3" x2="14" y2="10"/>
    </svg>
  </button>

  <!-- 토스트 -->
  <div id="toast"></div>

  <script>
    const btn = document.getElementById('fullscreen-btn');
    const toast = document.getElementById('toast');
    let fadeTimer = null;

    // 버튼 자동 페이드
    function startFade() {
      clearTimeout(fadeTimer);
      btn.classList.remove('faded');
      fadeTimer = setTimeout(() => {
        btn.classList.add('faded');
      }, 3000);
    }

    startFade();

    // 화면 터치/클릭 시 버튼 다시 보이기
    document.addEventListener('touchstart', startFade);
    document.addEventListener('mousemove', startFade);

    // 토스트 표시
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 전체화면 토글
    function toggleFullscreen() {
      const el = document.documentElement;
      const isFs = !!(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.mozFullScreenElement
      );

      if (!isFs) {
        // 전체화면 진입
        const req =
          el.requestFullscreen ||
          el.webkitRequestFullscreen ||
          el.mozRequestFullScreen ||
          el.msRequestFullscreen;
        if (req) {
          req.call(el).then(() => {
            document.body.classList.add('is-fullscreen');
            showToast('전체화면 모드');
            // 가로 방향 잠금 시도 (Android 지원)
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(() => {});
            }
          }).catch(() => {
            // 전체화면 API 미지원 시 iOS 대응
            document.body.classList.add('is-fullscreen');
            showToast('화면을 가로로 회전하세요');
          });
        } else {
          // iOS Safari 등 API 미지원
          document.body.classList.add('is-fullscreen');
          showToast('화면을 가로로 회전하세요');
        }
      } else {
        // 전체화면 해제
        const exit =
          document.exitFullscreen ||
          document.webkitExitFullscreen ||
          document.mozCancelFullScreen ||
          document.msExitFullscreen;
        if (exit) exit.call(document);
        document.body.classList.remove('is-fullscreen');
        showToast('전체화면 해제');
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      }

      startFade();
    }

    // 전체화면 상태 변경 감지
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.body.classList.remove('is-fullscreen');
      }
    });
    document.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitFullscreenElement) {
        document.body.classList.remove('is-fullscreen');
      }
    });
  </script>
</body>
</html>
